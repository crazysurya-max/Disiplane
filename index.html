<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>21 Days Discipline Challenge</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:50px;
    color:#00ff88;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#bbb;
    margin-bottom:40px;
    font-size:20px;
    line-height:1.5;
}

.streak-box{
    background:#1b1b1b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    margin-bottom:40px;
    box-shadow:0 0 20px rgba(0,255,136,0.15);
}

.day-number{
    font-size:80px;
    color:#00ff88;
    margin:20px 0;
    font-weight:bold;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.complete-btn{
    background:#00ff88;
    color:black;
}

.complete-btn:hover{
    background:#00cc6a;
    transform:scale(1.05);
}

.reset-btn{
    margin-top:15px;
    background:#ff4444;
    color:white;
}

.reset-btn:hover{
    background:#cc0000;
    transform:scale(1.05);
}

.days-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.day-card{
    background:#1b1b1b;
    padding:20px;
    border-radius:15px;
    border:2px solid #222;
    transition:0.3s;
}

.day-card.completed{
    border-color:#00ff88;
    background:#102218;
}

.day-title{
    font-size:22px;
    color:#00ff88;
    margin-bottom:15px;
}

textarea{
    width:100%;
    min-height:120px;
    background:#111;
    border:1px solid #333;
    border-radius:10px;
    padding:12px;
    color:white;
    resize:vertical;
    font-size:15px;
    outline:none;
}

textarea:focus{
    border-color:#00ff88;
}

.footer{
    text-align:center;
    margin-top:50px;
    color:#777;
    line-height:1.6;
}

@media(max-width:600px){

    h1{
        font-size:35px;
    }

    .day-number{
        font-size:60px;
    }

}

</style>
</head>

<body>

<div class="container">

    <h1>21 DAYS CHALLENGE</h1>

    <p class="subtitle">
        Build discipline. Control distractions. <br>
        Become mentally stronger every single day.
    </p>

    <div class="streak-box">

        <h2>Your Current Streak</h2>

        <div class="day-number" id="count">0</div>

        <button onclick="completeDay()" class="complete-btn">
            COMPLETE TODAY
        </button>

        <br>

        <button onclick="resetLastDay()" class="reset-btn">
            RESET LAST DAY
        </button>

    </div>

    <div class="days-container" id="daysContainer"></div>

    <div class="footer">
        Discipline is stronger than temporary pleasure.
    </div>

</div>

<script>

let currentDay = localStorage.getItem("challengeDay")
? parseInt(localStorage.getItem("challengeDay"))
: 0;

const count = document.getElementById("count");
const daysContainer = document.getElementById("daysContainer");

function renderDays(){

    daysContainer.innerHTML = "";

    for(let i=1; i<=21; i++){

        let savedNote = localStorage.getItem("noteDay" + i) || "";

        let card = document.createElement("div");

        card.classList.add("day-card");

        if(i <= currentDay){
            card.classList.add("completed");
        }

        card.innerHTML = `
            <div class="day-title">Day ${i}</div>

            <textarea 
                placeholder="Write your thoughts, struggles, progress..."
                oninput="saveNote(${i}, this.value)"
            >${savedNote}</textarea>
        `;

        daysContainer.appendChild(card);
    }

    count.innerText = currentDay;
}

function saveNote(day, value){

    localStorage.setItem("noteDay" + day, value);

}

function completeDay(){

    if(currentDay < 21){

        currentDay++;

        localStorage.setItem("challengeDay", currentDay);

        renderDays();

        if(currentDay === 21){

            alert("🔥 Congratulations! You completed the 21 Days Challenge.");

        }

    }else{

        alert("Challenge already completed.");

    }

}

function resetLastDay(){

    if(currentDay > 0){

        // Remove note of current day
        localStorage.removeItem("noteDay" + currentDay);

        // Reduce streak
        currentDay--;

        // Save updated streak
        localStorage.setItem("challengeDay", currentDay);

        // Refresh UI
        renderDays();

    }else{

        alert("No days to reset.");

    }

}

renderDays();

</script>

</body>
</html>
